<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening Obsidian...</title>
<style>
  body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; color: #333; }
  a { color: #7c3aed; }
  .fallback { margin-top: 24px; font-size: 14px; color: #888; }
</style>
<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const vault = params.get('vault') || 'Documents';
  if (file) {
    const url = 'obsidian://open?vault=' + encodeURIComponent(vault) + '&file=' + encodeURIComponent(file);
    window.location.href = url;
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('manual-link').href = url;
    });
  }
</script>
</head>
<body>
  <h2>Opening Obsidian...</h2>
  <p>If nothing happened, <a id="manual-link" href="#">click here</a>.</p>
  <p class="fallback">If Obsidian is not installed, <a href="https://obsidian.md">download it here</a>.</p>
</body>
</html>
