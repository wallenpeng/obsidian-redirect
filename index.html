<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening Obsidian...</title>
<style>
  body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; color: #333; }
  .open-btn { display: inline-block; margin: 20px 0; padding: 16px 32px; background: #7c3aed; color: #fff; text-decoration: none; border-radius: 8px; font-size: 18px; }
  .fallback { margin-top: 24px; font-size: 14px; color: #888; }
</style>
<script>
  // Extract raw file param to preserve exact encoding
  var fileEncoded = null;
  var m = window.location.search.match(/[?&]file=([^&]*)/);
  if (m) fileEncoded = m[1];

  var obsidianUrl = null;
  if (fileEncoded) {
    // Mac vault = "Documents", file includes "Cloud/" prefix
    // iPhone vault = "Cloud", file path strips "Cloud/" prefix
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      var mobileFile = fileEncoded.replace(/^Cloud\//, '');
      obsidianUrl = 'obsidian://open?vault=Cloud&file=' + mobileFile;
    } else {
      obsidianUrl = 'obsidian://open?vault=Documents&file=' + fileEncoded;
    }

    // Try auto-redirect
    window.location.href = obsidianUrl;
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (obsidianUrl) {
      document.getElementById('open-btn').href = obsidianUrl;
    } else {
      document.getElementById('open-btn').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }
  });
</script>
</head>
<body>
  <h2>Opening Obsidian...</h2>
  <a id="open-btn" class="open-btn" href="#">Open in Obsidian</a>
  <p id="error" style="display:none; color:#c00;">Missing file parameter.</p>
  <p class="fallback">If the note didn't open, tap the button above.</p>
</body>
</html>
